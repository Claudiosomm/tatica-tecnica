<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tática FC</title>
  <link rel="stylesheet" href="style.css">
  <style>
   .premium-badge {
      position: absolute; top: 12px; right: 12px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; display: none; z-index: 100;
    }
   .premium-badge.show { display: block; }
  </style>
</head>
<body>
  <!-- APP DIRETO - SEM LOGIN -->
  <div class="app">
    <div class="premium-badge" id="premium-badge">⭐ PREMIUM</div>
    <header class="app-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="window.location='index.html'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#f1f5f9;font-size:13px;font-weight:600;cursor:pointer">← Times</button>
        <h1>Tática FC</h1>
      </div>
      <select id="formation-select" onchange="changeFormation()">
        <option value="4-4-2">4-4-2</option>
        <option value="4-3-3">4-3-3</option>
        <option value="4-2-3-1">4-2-3-1</option>
        <option value="4-5-1">4-5-1</option>
        <option value="3-5-2">3-5-2</option>
        <option value="3-4-3">3-4-3</option>
        <option value="5-3-2">5-3-2</option>
        <option value="5-4-1">5-4-1</option>
        <option value="4-1-4-1">4-1-4-1</option>
        <option value="4-3-2-1">4-3-2-1</option>
      </select>
    </header>

    <div class="name-editor" id="name-editor">
      <input type="text" id="edit-name-input" placeholder="Selecione um jogador no campo" disabled>
      <button onclick="savePlayerName()" id="save-name-btn" disabled>Salvar</button>
    </div>

    <div id="pitch-container" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropNoCampo(event)">
      <div class="pitch-lines">
        <div class="grass-pattern"></div>
        <div class="center-circle"></div>
        <div class="penalty-area top"></div>
        <div class="penalty-area bottom"></div>
        <div class="goal-area top"></div>
        <div class="goal-area bottom"></div>
        <div class="halfway-line"></div>
      </div>
      <div id="field-players"></div>
    </div>

    <div class="add-player-bar">
      <input type="number" id="new-player-number" placeholder="Nº" min="1" max="99" class="input-number">
      <input type="text" id="new-player-input" placeholder="Nome do jogador..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button onclick="addPlayer()">+ Adicionar</button>
    </div>

    <div class="section">
      <h3>Banco de Reservas</h3>
      <div id="bench-list" class="player-list" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropToBench(event)"></div>
    </div>

    <div class="section ausentes">
      <h3>Ausentes</h3>
      <div id="ausentes-list" class="player-list" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropToAusentes(event)"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
