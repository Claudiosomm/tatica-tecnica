<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tática FC - Monte seu time</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
    }

    /* TELA INICIAL - HERO */
 .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Campo animado no fundo */
 .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(59,130,246,0.15) 0%, transparent 50%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      z-index: 0;
    }

 .hero::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border: 2px solid rgba(59,130,246,0.1);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 3s infinite;
    }

   @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; }
    }

 .hero-content {
      position: relative;
      z-index: 1;
      max-width: 500px;
    }

 .logo {
      font-size: 64px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

   @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

 .hero h1 {
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: gradient 3s ease infinite;
    }

   @keyframes gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

 .hero p {
      font-size: 16px;
      color: rgba(241,245,249,0.7);
      margin-bottom: 32px;
      line-height: 1.6;
    }

 .btn-hero {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 16px;
      transition: all 0.2s;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
    }

 .btn-hero:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(59,130,246,0.6);
    }

 .btn-hero:active { transform: scale(0.98); }

 .btn-secondary {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(241,245,249,0.9);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 24px;
    }

 .features {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

 .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(241,245,249,0.6);
    }

 .feature-icon {
      font-size: 24px;
    }

    /* LISTA DE TIMES - ESCONDIDA INICIALMENTE */
 .app-container {
      display: none;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px;
      min-height: 100vh;
    }

 .app-container.show { display: block; }
 .header { margin-bottom: 28px; text-align: center; position: relative; }
 .header h1 {
      font-size: 32px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
 .premium-badge {
      position: absolute; top: 0; right: 0;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; cursor: pointer; display: none;
    }
 .premium-badge.show { display: block; }
 .novo-time {
      width: 100%; padding: 18px; border-radius: 16px;
      border: 2px dashed rgba(59,130,246,.5);
      background: rgba(59,130,246,.1); backdrop-filter: blur(12px);
      color: #3b82f6; font-size: 16px; font-weight: 700; cursor: pointer;
      margin-bottom: 24px; transition: all 0.2s;
    }
 .novo-time:hover { background: rgba(59,130,246,.2); border-color: #3b82f6; transform: translateY(-2px); }
 .empty { text-align: center; padding: 60px 20px; color: rgba(241,245,249,.4); font-size: 15px; }
 .time-card {
      background: rgba(30,41,59,0.7); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1); border-radius: 16px;
      padding: 18px; margin-bottom: 14px; display: flex;
      justify-content: space-between; align-items: center; cursor: pointer;
    }
 .time-info h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
 .time-meta { display: flex; gap: 12px; font-size: 12px; color: rgba(241,245,249,.5); }
 .time-actions { display: flex; gap: 8px; }
 .btn { padding: 8px 14px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
 .btn-edit { background: rgba(59,130,246,.2); color: #3b82f6; border: 1px solid rgba(59,130,246,.3); }
 .btn-delete { background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }

    /* PAYWALL - mesmo de antes */
 .paywall { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); z-index: 99999; align-items: center; justify-content: center; padding: 20px; }
 .paywall.show { display: flex; }
 .paywall-content { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid rgba(59,130,246,.3); border-radius: 24px; padding: 32px 24px; max-width: 400px; width: 100%; text-align: center; }
 .paywall-content h2 { font-size: 28px; margin-bottom: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 .btn-premium { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
 .btn-vitalicio { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; position: relative; overflow: hidden; }
 .btn-close { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05); color: rgba(241,245,249,.7); font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <!-- TELA INICIAL HERO -->
  <div class="hero" id="hero">
    <div class="hero-content">
      <div class="logo">⚽</div>
      <h1>Tática FC</h1>
      <p>Monte formações, escale seu time e visualize táticas como um técnico profissional</p>

      <button class="btn-hero" onclick="comecarApp()">
        Criar Meu Primeiro Time
      </button>

      <button class="btn-secondary" onclick="verTimes()">
        Ver Meus Times
      </button>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">📋</div>
          <span>10 Formações</span>
        </div>
        <div class="feature">
          <div class="feature-icon">👥</div>
          <span>15 Jogadores</span>
        </div>
        <div class="feature">
          <div class="feature-icon">💾</div>
          <span>Salvo Offline</span>
        </div>
      </div>
    </div>
  </div>

  <!-- APP PRINCIPAL -->
  <div class="app-container" id="app">
    <div class="header">
      <div class="premium-badge" id="premium-badge" onclick="mostrarPaywall()">⭐ PREMIUM</div>
      <h1>⚽ Meus Times</h1>
      <p>Gerencie suas formações táticas</p>
    </div>
    <button class="novo-time" onclick="criarNovoTime()">+ Novo Time</button>
    <div id="lista-times"></div>
  </div>

  <!-- PAYWALL -->
  <div class="paywall" id="paywall">
    <div class="paywall-content">
      <h2>🚀 Desbloqueie o Premium</h2>
      <p id="paywall-text">Crie times ilimitados e acesse todas as formações</p>
      <button class="btn-premium" onclick="assinarPremium('mensal')">Mensal - R$ 9,90/mês</button>
      <button class="btn-vitalicio" onclick="assinarPremium('vitalicio')">👑 Vitalício - R$ 39,90</button>
      <button class="btn-close" onclick="fecharPaywall()">Agora não</button>
    </div>
  </div>

  <script>
let times = JSON.parse(localStorage.getItem('todos_times')) || {};

// Não esconde mais a hero. Ela sempre aparece primeiro.
// Só esconde quando clicar nos botões

function comecarApp() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('app').classList.add('show');
  criarNovoTime();
}

function verTimes() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('app').classList.add('show');
  renderTimes();
}

function ehPremium() {
  const tipo = localStorage.getItem('premium_tipo');
  return tipo === 'mensal' || tipo === 'vitalicio';
}

const tipoPremium = localStorage.getItem('premium_tipo');
if (tipoPremium) {
  const badge = document.getElementById('premium-badge');
  badge.textContent = tipoPremium === 'vitalicio'? '👑 VITALÍCIO' : '⭐ PREMIUM';
  badge.classList.add('show');
}

function renderTimes() {
  const lista = Object.values(times).sort((a,b) => b.atualizado - a.atualizado);
  const container = document.getElementById('lista-times');
  if (lista.length === 0) {
    container.innerHTML = '<div class="empty">Nenhum time criado ainda.<br>Clique acima para começar.</div>';
    return;
  }
  container.innerHTML = lista.map(t => {
    const data = new Date(t.atualizado).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
    return `
      <div class="time-card" onclick="abrirTime('${t.id}')">
        <div class="time-info">
          <h3>${t.nome}</h3>
          <div class="time-meta">
            <span>👥 ${t.jogadores.length} jogadores</span>
            <span>📅 ${data}</span>
          </div>
        </div>
        <div class="time-actions" onclick="event.stopPropagation()">
          <button class="btn btn-edit" onclick="renomear('${t.id}')">Renomear</button>
          <button class="btn btn-delete" onclick="deletar('${t.id}')">Excluir</button>
        </div>
      </div>
    `;
  }).join('');
}

function criarNovoTime() {
  const qtdTimes = Object.keys(times).length;
  if (qtdTimes >= 1 &&!ehPremium()) {
    mostrarPaywall('Apenas 1 time no plano grátis');
    return;
  }
  window.location.href = 'tatica.html';
}

function abrirTime(id) { window.location.href = 'tatica.html?time=' + id; }
function renomear(id) {
  const novo = prompt('Novo nome do time:', times[id].nome);
  if (novo && novo.trim()) {
    times[id].nome = novo.trim();
    times[id].atualizado = Date.now();
    localStorage.setItem('todos_times', JSON.stringify(times));
    renderTimes();
  }
}
function deletar(id) {
  if (confirm('Deletar "' + times[id].nome + '"?')) {
    delete times[id];
    localStorage.setItem('todos_times', JSON.stringify(times));
    renderTimes();
  }
}
function mostrarPaywall(msg) {
  if (msg) document.getElementById('paywall-text').textContent = msg;
  document.getElementById('paywall').classList.add('show');
}
function fecharPaywall() { document.getElementById('paywall').classList.remove('show'); }
function assinarPremium(tipo = 'mensal') {
  localStorage.setItem('premium_tipo', tipo);
  alert(`Premium ${tipo === 'vitalicio'? 'Vitalício' : 'Mensal'} ativado!`);
  location.reload();
}

renderTimes();
</script>
</body>
</html>
